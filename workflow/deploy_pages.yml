name: Build Zola and Deploy to GitHub Pages

permissions:
  contents: write # 强行开启写入权限

on:
  workflow_dispatch:
  schedule:
    - cron: "1 0 */14 * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 临时下载并安装原生 Zola 编译器
      - name: Install Zola
        run: |
          sudo snap install zola --edge

      # 2. 从 Codeberg 安全拉取你的私有源码
      - name: Checkout Codeberg Private Source
        uses: actions/checkout@v4
        with:
          repository: "SuchaharCan/SuzhaharCan.codeberg.page" # ⚠️请把这里改成你真实的Codeberg仓库名
          token: ${{ secrets.CODEBERG_TOKEN }}
          path: "zola_source"

      # 3. 切换到源码目录，并在内存中编译出静态网页 HTML
      - name: Build Zola Site
        run: |
          cd zola_source
          zola build --output-dir ../public_html

      # 4. 纯手工精确无污染推送到 GitHub 的 gh-pages 分支
      - name: Deploy Pure HTML to gh-pages
        run: |
          cd public_html
          git init
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Automated deploy from Codeberg (Pure HTML)"
          # 使用包含写权限的内部 Token 强行创建并推送到远程的 gh-pages 分支
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages --force
